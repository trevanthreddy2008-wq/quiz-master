name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Project Files
        run: |
          mkdir -p app/src/main/java
          printf 'pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }\n' > settings.gradle
          printf 'dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }\n' >> settings.gradle
          printf 'rootProject.name = "QuizMaster"\ninclude ":app"\n' >> settings.gradle
          
          printf 'plugins {\n    id "com.android.application" version "8.1.1" apply false\n    id "org.jetbrains.kotlin.android" version "1.8.20" apply false\n}' > build.gradle
          
          printf 'plugins {\n    id "com.android.application"\n    id "org.jetbrains.kotlin.android"\n}\nandroid {\n    namespace "com.example.quizmaster"\n    compileSdk 34\n    defaultConfig {\n        applicationId "com.example.quizmaster"\n        minSdk 24\n        targetSdk 34\n    }\n}' > app/build.gradle

      - name: Build with Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.1.1
          arguments: assembleDebug

      - name: Upload Finished App
        uses: actions/upload-artifact@v4
        with:
          name: QuizMasterGame
          path: app/build/outputs/apk/debug/app-debug.apk
          
