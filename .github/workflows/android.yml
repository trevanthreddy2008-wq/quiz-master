name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Project Files
        run: |
          mkdir -p app/src/main/java app/src/main/res/values
          
          # 1. settings.gradle: Explicitly define repositories for BOTH plugins and project dependencies
          printf 'pluginManagement { repositories { google(); mavenCentral(); gradlePortal() } }\n' > settings.gradle
          printf 'dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }\n' >> settings.gradle
          printf 'rootProject.name = "QuizMaster"\ninclude ":app"\n' >> settings.gradle
          
          # 2. Root build.gradle
          printf 'plugins { id "com.android.application" version "8.1.1" apply false; id "org.jetbrains.kotlin.android" version "1.8.20" apply false }' > build.gradle
          
          # 3. app/build.gradle: Simplified dependencies to avoid complex resolution tree failures
          printf 'plugins { id "com.android.application"; id "org.jetbrains.kotlin.android" }\nandroid { namespace "com.example.quizmaster"; compileSdk 34; defaultConfig { applicationId "com.example.quizmaster"; minSdk 24; targetSdk 34 } }\ndependencies { implementation "androidx.appcompat:appcompat:1.6.1" }' > app/build.gradle
          
          # 4. Essential files
          printf '<?xml version="1.0" encoding="utf-8"?><manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.example.quizmaster" />' > app/src/main/AndroidManifest.xml
          printf '<?xml version="1.0" encoding="utf-8"?><resources><string name="app_name">QuizMaster</string></resources>' > app/src/main/res/values/strings.xml

      - name: Build with Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.1.1
          arguments: assembleDebug

      - name: Upload Finished App
        uses: actions/upload-artifact@v4
        with:
          name: QuizMasterGame
          path: app/build/outputs/apk/debug/app-debug.apk
          
