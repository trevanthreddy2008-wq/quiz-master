name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Auto Create Project Structure
      run: |
        rm -rf app build.gradle settings.gradle gradle.properties
        mkdir -p app/src/main/res/layout
        
        # Define modern platform behaviors
        echo "org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8" > gradle.properties
        echo "android.useAndroidX=true" >> gradle.properties
        echo "android.enableJetifier=true" >> gradle.properties
        
        # Root-level configuration using contemporary plugins block syntax
        echo "plugins {
            id 'com.android.application' version '8.1.1' apply false
            id 'com.android.library' version '8.1.1' apply false
        }" > build.gradle
        
        # Centralized dependency settings file configuration
        echo "pluginManagement {
            repositories { google(); mavenCentral(); gradlePluginPortal() }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories { google(); mavenCentral() }
        }
        rootProject.name = 'QuizMaster'
        include ':app'" > settings.gradle
        
        # Refactored app module build script matching the parent plugin versions
        echo "plugins {
            id 'com.android.application'
        }
        android {
            namespace 'com.example.quizmaster'
            compileSdk 33
            defaultConfig {
                applicationId 'com.example.quizmaster'
                minSdk 24
                targetSdk 33
                versionCode 1
                versionName '1.0'
            }
        }
        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.9.0'
        }" > app/build.gradle

        # Safely copy down the loose layout assets provided by Claude
        [ -f AndroidManifest.xml ] && cp AndroidManifest.xml app/src/main/ || echo "No Manifest found"
        [ -f activity_main.xml ] && cp activity_*.xml app/src/main/res/layout/ || echo "No layout files found"

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Build APK File
      run: |
        gradle wrapper --gradle-version 8.1.1
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload Finished App
      uses: actions/upload-artifact@v4
      with:
        name: QuizMasterGame
        path: app/build/outputs/apk/debug/app-debug.apk
        
