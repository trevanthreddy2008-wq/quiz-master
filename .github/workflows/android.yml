name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Auto Create Project Structure
      run: |
        mkdir -p app/src/main/res/layout
        
        echo "plugins { id 'com.android.application' version '8.1.1' apply false }" > build.gradle
        echo "include ':app'" > settings.gradle
        
        echo "plugins { id 'com.android.application' }
        android {
            namespace 'com.example.quizmaster'
            compileSdk 33
            defaultConfig {
                applicationId 'com.example.quizmaster'
                minSdk 24
                targetSdk 33
                versionCode 1
                versionName '1.0'
            }
        }
        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.9.0'
        }" > app/build.gradle

        [ -f AndroidManifest.xml ] && mv AndroidManifest.xml app/src/main/
        [ -f activity_main.xml ] && mv activity_*.xml app/src/main/res/layout/ || true

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Build APK File
      run: |
        gradle wrapper
        ./gradlew assembleDebug

    - name: Upload Finished App
      uses: actions/upload-artifact@v4
      with:
        name: QuizMasterGame
        path: app/build/outputs/apk/debug/app-debug.apk
        
