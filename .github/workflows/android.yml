name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: "17"
        distribution: "temurin"

    - name: Auto Create Project Structure
      run: |
        rm -rf app build.gradle settings.gradle gradle.properties
        mkdir -p app/src/main/res/layout
        
        # 1. Create properties configuration
        cat << 'EOF' > gradle.properties
        org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
        android.useAndroidX=true
        android.enableJetifier=true
        EOF
        
        # 2. Create master build script configuration
        cat << 'EOF' > build.gradle
        buildscript {
            repositories {
                google()
                mavenCentral()
            }
            dependencies {
                classpath "com.android.tools.build:gradle:8.0.2"
            }
        }
        allprojects {
            repositories {
                google()
                mavenCentral()
            }
        }
        EOF
        
        # 3. Create settings file configuration
        cat << 'EOF' > settings.gradle
        rootProject.name = "QuizMaster"
        include ":app"
        EOF
        
        # 4. Create app module configuration configuration
        cat << 'EOF' > app/build.gradle
        apply plugin: "com.android.application"

        android {
            namespace "com.example.quizmaster"
            compileSdk 33
            defaultConfig {
                applicationId "com.example.quizmaster"
                minSdk 24
                targetSdk 33
                versionCode 1
                versionName "1.0"
            }
        }

        dependencies {
            implementation "androidx.appcompat:appcompat:1.6.1"
            implementation "com.google.android.material:material:1.9.0"
        }
        EOF

        # 5. Route project layout assets into target locations
        [ -f AndroidManifest.xml ] && cp AndroidManifest.xml app/src/main/ || echo "No Manifest"
        [ -f activity_main.xml ] && cp activity_*.xml app/src/main/res/layout/ || echo "No Layouts"

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Build APK File
      run: |
        gradle wrapper --gradle-version 8.0
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload Finished App
      uses: actions/upload-artifact@v4
      with:
        name: QuizMasterGame
        path: app/build/outputs/apk/debug/app-debug.apk
        
