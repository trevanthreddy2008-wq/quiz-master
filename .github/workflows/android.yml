name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Intelligent Project Assembler & AdMob Integrator
      shell: python
      run: |
        import os, shutil, re

        # 1. Clear out any bad cache/legacy structures safely
        for item in ['app', 'build.gradle', 'settings.gradle', 'gradle.properties']:
            if os.path.exists(item):
                if os.path.isdir(item): shutil.rmtree(item)
                else: os.remove(item)

        # Create structural baselines
        os.makedirs("app/src/main/res/layout", exist_ok=True)
        os.makedirs("app/src/main/res/drawable", exist_ok=True)
        os.makedirs("app/src/main/res/values", exist_ok=True)
        os.makedirs("app/src/main/res/xml", exist_ok=True)
        os.makedirs("app/src/main/res/mipmap", exist_ok=True)
        os.makedirs("app/src/main/java", exist_ok=True)

        # 2. Automatically detect your project package name from the source code
        detected_package = "com.example.quizmaster"
        found_source = False

        for root, dirs, files in os.walk("."):
            if any(p in root for p in ["./app", "./.github", "./.git"]): continue
            for f in files:
                full_path = os.path.join(root, f)
                if f.endswith(".java") or f.endswith(".kt"):
                    with open(full_path, "r", encoding="utf-8", errors="ignore") as sf:
                        content = sf.read()
                    pkg_match = re.search(r"package\s+([a-zA-Z0-9_.]+);", content)
                    if pkg_match and not found_source:
                        detected_package = pkg_match.group(1)
                        found_source = True

        print(f"-> Verified App Package Domain: {detected_package}")

        # 3. Sort, clean, and map all repository assets to their true compiler targets
        for root, dirs, files in os.walk("."):
            if any(p in root for p in ["./app", "./.github", "./.git"]): continue
            for f in files:
                full_path = os.path.join(root, f)
                
                # Relocate Core Manifest
                if f == "AndroidManifest.xml":
                    shutil.copy(full_path, "app/src/main/AndroidManifest.xml")
                    continue
                
                # Sort Source Code and match package structure
                if f.endswith(".java") or f.endswith(".kt"):
                    with open(full_path, "r", encoding="utf-8", errors="ignore") as sf:
                        content = sf.read()
                    pkg_match = re.search(r"package\s+([a-zA-Z0-9_.]+);", content)
                    pkg = pkg_match.group(1) if pkg_match else detected_package
                    pkg_dir = os.path.join("app/src/main/java", pkg.replace(".", "/"))
                    os.makedirs(pkg_dir, exist_ok=True)
                    shutil.copy(full_path, os.path.join(pkg_dir, f))
                    continue

                # Clean and migrate layout views
                if f.endswith(".xml") and any(x in f for x in ["activity_", "dialog_", "fragment_", "item_"]):
                    target_path = os.path.join("app/src/main/res/layout", f)
                    shutil.copy(full_path, target_path)
                    with open(target_path, "r", encoding="utf-8") as lf:
                        l_text = lf.read()
                    l_text = re.sub(r'\s*tools:[a-zA-Z0-9_]+="[^"]*"', '', l_text)
                    l_text = re.sub(r"\s*tools:[a-zA-Z0-9_]+='[^']*'", '', l_text)
                    l_text = re.sub(r'\s*xmlns:tools="[^"]*"', '', l_text)
                    l_text = re.sub(r"\s*xmlns:tools='[^']*'", '', l_text)
                    with open(target_path, "w", encoding="utf-8") as lf:
                        lf.write(l_text)
                    continue

                # Capture graphical assets/drawables
                if f.endswith((".png", ".jpg", ".jpeg", ".webp", ".gif")):
                    shutil.copy(full_path, os.path.join("app/src/main/res/drawable", f.lower()))
                    continue

                # Capture drawable configuration vector maps
                if f.endswith(".xml") and ("drawable" in root.lower() or any(x in f for x in ["bg_", "ic_", "btn_", "shape_"])):
                    shutil.copy(full_path, os.path.join("app/src/main/res/drawable", f.lower()))
                    continue

        # 4. Generate configurations with AdMob repositories enabled
        with open("gradle.properties", "w") as fp:
            fp.write("org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8\nandroid.useAndroidX=true\nandroid.enableJetifier=true\n")

        with open("settings.gradle", "w") as settings:
            settings.write('pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }\n')
            settings.write('dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }\n')
            settings.write('rootProject.name = "QuizMaster"\ninclude ":app"\n')

        with open("build.gradle", "w") as bg:
            bg.write("plugins { id 'com.android.application' version '8.1.1' apply false\nid 'com.android.library' version '8.1.1' apply false }\n")

        # INJECTING GOOGLE ADMOB HERE SO IT STAYS IN YOUR APK
        app_gradle_content = f"""plugins {{ id 'com.android.application' }}
        android {{
            namespace '{detected_package}'
            compileSdk 33
            defaultConfig {{
                applicationId '{detected_package}'
                minSdk 24
                targetSdk 33
                versionCode 1
                versionName '1.0'
            }}
        }}
        dependencies {{
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.9.0'
            implementation 'com.google.android.gms:play-services-ads:23.1.0'
        }}"""
        with open("app/build.gradle", "w") as ag:
            ag.write(app_gradle_content)

        # 5. Fallback safety generation to satisfy system requirements
        with open("app/src/main/res/values/themes.xml", "w") as th:
            th.write('<resources><style name="Theme.QuizMaster" parent="Theme.MaterialComponents.DayNight.NoActionBar"><item name="colorPrimary">#6200EE</item><item name="colorSecondary">#03DAC6</item></style></resources>')
        with open("app/src/main/res/values/strings.xml", "w") as st:
            st.write('<resources><string name="app_name">QuizMaster</string></resources>')
        with open("app/src/main/res/xml/backup_rules.xml", "w") as br:
            br.write('<?xml version="1.0" encoding="utf-8"?><full-backup-content />')
        with open("app/src/main/res/xml/data_extraction_rules.xml", "w") as de:
            de.write('<?xml version="1.0" encoding="utf-8"?><data-extraction-rules><cloud-backup /><device-transfer /></data-extraction-rules>')
        
        icon_data = '<?xml version="1.0" encoding="utf-8"?><adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android"><background android:drawable="@android:color/darker_gray"/><foreground android:drawable="@android:color/white"/></adaptive-icon>'
        with open("app/src/main/res/mipmap/ic_launcher.xml", "w") as ic: ic.write(icon_data)
        with open("app/src/main/res/mipmap/ic_launcher_round.xml", "w") as icr: icr.write(icon_data)

    - name: Setup Centralized Gradle Engine
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.1.1

    - name: Build Executable App Artifact
      run: |
        gradle wrapper
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload Finished App
      uses: actions/upload-artifact@v4
      with:
        name: QuizMasterGame
        path: app/build/outputs/apk/debug/app-debug.apk
        
