name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Ultimate Project Assembler & AdMob Shield
      shell: python
      run: |
        import os, shutil, re

        # 1. Clear out any legacy paths to prevent build conflicts
        for item in ['app', 'build.gradle', 'settings.gradle', 'gradle.properties']:
            if os.path.exists(item):
                if os.path.isdir(item): shutil.rmtree(item)
                else: os.remove(item)

        # Build baseline compilation tree
        os.makedirs("app/src/main/res/layout", exist_ok=True)
        os.makedirs("app/src/main/res/drawable", exist_ok=True)
        os.makedirs("app/src/main/res/values", exist_ok=True)
        os.makedirs("app/src/main/res/xml", exist_ok=True)
        os.makedirs("app/src/main/res/mipmap", exist_ok=True)
        os.makedirs("app/src/main/java", exist_ok=True)

        # 2. Dynamic package name, language, and activity analyzer
        detected_package = "com.example.quizmaster"
        main_activity_name = "MainActivity"
        found_source = False
        has_kotlin = False

        for root, dirs, files in os.walk("."):
            norm_root = root.replace("\\", "/")
            if any(p in norm_root.split("/") for p in ["app", ".github", ".git", "build"]): continue
            for f in files:
                if f.endswith(".kt"):
                    has_kotlin = True
                if f.endswith((".java", ".kt")):
                    full_path = os.path.join(root, f)
                    with open(full_path, "r", encoding="utf-8", errors="ignore") as sf:
                        content = sf.read()
                    pkg_match = re.search(r"package\s+([a-zA-Z0-9_.]+);", content)
                    if pkg_match and not found_source:
                        detected_package = pkg_match.group(1)
                        found_source = True
                    if "Activity" in f and main_activity_name == "MainActivity":
                        main_activity_name = f.split(".")[0]

        print(f"-> Detected App Package ID: {detected_package}")
        print(f"-> Detected Launcher Activity: {main_activity_name}")
        print(f"-> Kotlin files found in project: {has_kotlin}")

        # 3. Smart Asset Router (Classifies and moves files based on contents)
        manifest_copied = False
        for root, dirs, files in os.walk("."):
            norm_root = root.replace("\\", "/")
            if any(p in norm_root.split("/") for p in ["app", ".github", ".git", "build"]): continue
            for f in files:
                full_path = os.path.join(root, f)
                
                if f == "AndroidManifest.xml":
                    shutil.copy(full_path, "app/src/main/AndroidManifest.xml")
                    manifest_copied = True
                    continue

                if f.endswith((".java", ".kt")):
                    with open(full_path, "r", encoding="utf-8", errors="ignore") as sf:
                        content = sf.read()
                    pkg_match = re.search(r"package\s+([a-zA-Z0-9_.]+);", content)
                    pkg = pkg_match.group(1) if pkg_match else detected_package
                    pkg_dir = os.path.join("app/src/main/java", pkg.replace(".", "/"))
                    os.makedirs(pkg_dir, exist_ok=True)
                    shutil.copy(full_path, os.path.join(pkg_dir, f))
                    continue

                if f.endswith((".png", ".jpg", ".jpeg", ".webp", ".gif")):
                    shutil.copy(full_path, os.path.join("app/src/main/res/drawable", f.lower()))
                    continue

                if f.endswith(".xml"):
                    with open(full_path, "r", encoding="utf-8", errors="ignore") as xf:
                        xml_content = xf.read()
                    
                    if "<manifest" in xml_content and not manifest_copied:
                        shutil.copy(full_path, "app/src/main/AndroidManifest.xml")
                        manifest_copied = True
                    elif "layout_width" in xml_content or "layout_height" in xml_content:
                        target_path = os.path.join("app/src/main/res/layout", f)
                        shutil.copy(full_path, target_path)
                        # Sanitize layout file namespaces
                        xml_content = re.sub(r'\s*tools:[a-zA-Z0-9_]+="[^"]*"', '', xml_content)
                        xml_content = re.sub(r"\s*tools:[a-zA-Z0-9_]+='[^']*'", '', xml_content)
                        xml_content = re.sub(r'\s*xmlns:tools="[^"]*"', '', xml_content)
                        xml_content = re.sub(r"\s*xmlns:tools='[^']*'", '', xml_content)
                        with open(target_path, "w", encoding="utf-8") as lf:
                            lf.write(xml_content)
                    elif any(tag in xml_content for tag in ["<vector", "<shape", "<selector", "<layer-list", "<ripple"]):
                        shutil.copy(full_path, os.path.join("app/src/main/res/drawable", f.lower()))
                    elif "<resources" in xml_content and not any(x in f for x in ["themes", "styles", "strings"]):
                        shutil.copy(full_path, os.path.join("app/src/main/res/values", f))

        # 4. Manifest Safeguard: Ensure AdMob App ID always exists
        target_manifest = "app/src/main/AndroidManifest.xml"
        if os.path.exists(target_manifest):
            with open(target_manifest, "r", encoding="utf-8") as mf:
                m_text = mf.read()
            if "xmlns:tools" not in m_text and "<manifest" in m_text:
                m_text = m_text.replace("<manifest", '<manifest xmlns:tools="http://schemas.android.com/tools"')
            if "com.google.android.gms.ads.APPLICATION_ID" not in m_text:
                admob_meta = '\n        <meta-data\n            android:name="com.google.android.gms.ads.APPLICATION_ID"\n            android:value="ca-app-pub-3940256099942544~3347511713"/>'
                if "</application>" in m_text:
                    m_text = m_text.replace("</application>", admob_meta + "\n    </application>")
                with open(target_manifest, "w", encoding="utf-8") as mf:
                    mf.write(m_text)
        else:
            fallback_manifest = f"""<?xml version="1.0" encoding="utf-8"?>
            <manifest xmlns:android="http://schemas.android.com/apk/res/android" xmlns:tools="http://schemas.android.com/tools">
                <application
                    android:allowBackup="true"
                    android:dataExtractionRules="@xml/data_extraction_rules"
                    android:fullBackupContent="@xml/backup_rules"
                    android:icon="@mipmap/ic_launcher"
                    android:label="@string/app_name"
                    android:roundIcon="@mipmap/ic_launcher_round"
                    android:supportsRtl="true"
                    android:theme="@style/Theme.QuizMaster">
                    <meta-data
                        android:name="com.google.android.gms.ads.APPLICATION_ID"
                        android:value="ca-app-pub-3940256099942544~3347511713"/>
                    <activity android:name=".{main_activity_name}" android:exported="true">
                        <intent-filter>
                            <action android:name="android.intent.action.MAIN" />
                            <category android:name="android.intent.category.LAUNCHER" />
                        </intent-filter>
                    </activity>
                </application>
            </manifest>"""
            with open(target_manifest, "w", encoding="utf-8") as f:
                f.write(fallback_manifest)

        # 5. Write System Properties & Gradle Structure Configurations
        with open("gradle.properties", "w") as fp:
            fp.write("org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8\nandroid.useAndroidX=true\nandroid.enableJetifier=true\n")

        with open("settings.gradle", "w") as settings:
            settings.write('pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }\n')
            # Changed to PREFER_SETTINGS to prevent third-party dependency initialization crashes
            settings.write('dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS); repositories { google(); mavenCentral() } }\n')
            settings.write('rootProject.name = "QuizMaster"\ninclude ":app"\n')

        with open("build.gradle", "w") as bg:
            bg.write("plugins {\n    id 'com.android.application' version '8.1.1' apply false\n    id 'com.android.library' version '8.1.1' apply false\n")
            if has_kotlin:
                bg.write("    id 'org.jetbrains.kotlin.android' version '1.8.20' apply false\n")
            bg.write("}\n")

        # Dynamic Plugin generation based on source types
        plugins_block = "plugins {\n    id 'com.android.application'\n"
        if has_kotlin:
            plugins_block += "    id 'org.jetbrains.kotlin.android'\n"
        plugins_block += "}"

        # Setup standard core layouts and AdMob components
        deps_block = """dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.9.0'
            implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
            implementation 'com.google.android.gms:play-services-ads:23.1.0'"""
        if has_kotlin:
            deps_block += "\n    implementation 'androidx.core:core-ktx:1.10.1'"
        deps_block += "\n}"

        app_gradle_content = f"""{plugins_block}
        android {{
            namespace '{detected_package}'
            compileSdk 34
            defaultConfig {{
                applicationId '{detected_package}'
                minSdk 24
                targetSdk 34
                versionCode 1
                versionName '1.0'
                multiDexEnabled true
            }}
        }}
        {deps_block}"""
        with open("app/build.gradle", "w") as ag:
            ag.write(app_gradle_content)

        # 6. Fallback asset generation for smooth compilations
        with open("app/src/main/res/values/themes.xml", "w") as th:
            th.write('<resources><style name="Theme.QuizMaster" parent="Theme.MaterialComponents.DayNight.NoActionBar"><item name="colorPrimary">#6200EE</item><item name="colorSecondary">#03DAC6</item></style></resources>')
        with open("app/src/main/res/values/strings.xml", "w") as st:
            st.write('<resources><string name="app_name">QuizMaster</string></resources>')
        with open("app/src/main/res/xml/backup_rules.xml", "w") as br:
            br.write('<?xml version="1.0" encoding="utf-8"?><full-backup-content />')
        with open("app/src/main/res/xml/data_extraction_rules.xml", "w") as de:
            de.write('<?xml version="1.0" encoding="utf-8"?><data-extraction-rules><cloud-backup /><device-transfer /></data-extraction-rules>')
        
        icon_data = '<?xml version="1.0" encoding="utf-8"?><adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android"><background android:drawable="@android:color/darker_gray"/><foreground android:drawable="@android:color/white"/></adaptive-icon>'
        with open("app/src/main/res/mipmap/ic_launcher.xml", "w") as ic: ic.write(icon_data)
        with open("app/src/main/res/mipmap/ic_launcher_round.xml", "w") as icr: icr.write(icon_data)

    - name: Setup Centralized Gradle Engine
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.1.1

    - name: Build Executable App Artifact
      run: |
        gradle wrapper
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload Finished App
      uses: actions/upload-artifact@v4
      with:
        name: QuizMasterGame
        path: app/build/outputs/apk/debug/app-debug.apk
        
