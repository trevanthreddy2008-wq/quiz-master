name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Ultimate Project Assembler
      shell: python
      run: |
        import os, shutil, re
        
        # [Python logic stays exactly the same as before to map your files]
        # (Keep the code you had, ensuring 'android.auto-download=true' is in gradle.properties)

        with open("gradle.properties", "w") as fp:
            fp.write("org.gradle.jvmargs=-Xmx2048m\nandroid.useAndroidX=true\nandroid.enableJetifier=true\nandroid.sdk.path=/usr/local/lib/android/sdk\nandroid.auto-download=true\n")

    - name: Setup Gradle and Build
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.1.1
        # This action automatically handles SDK licenses and components
        arguments: assembleDebug

    - name: Upload Finished App
      uses: actions/upload-artifact@v4
      with:
        name: QuizMasterGame
        path: app/build/outputs/apk/debug/app-debug.apk
        
