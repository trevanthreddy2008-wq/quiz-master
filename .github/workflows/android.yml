name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Auto Create Project Structure
      run: |
        rm -rf app build.gradle settings.gradle gradle.properties
        mkdir -p app/src/main/res/layout
        
        echo "org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8" > gradle.properties
        echo "android.useAndroidX=true" >> gradle.properties
        echo "android.enableJetifier=true" >> gradle.properties
        
        # Simplified standard build architecture syntax
        echo "buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:7.4.2' }
        }
        allprojects {
            repositories { google(); mavenCentral() }
        }" > build.gradle
        
        echo "include ':app'
        rootProject.name = 'QuizMaster'" > settings.gradle
        
        echo "apply plugin: 'com.android.application'
        android {
            namespace 'com.example.quizmaster'
            compileSdkVersion 33
            defaultConfig {
                applicationId 'com.example.quizmaster'
                minSdkVersion 24
                targetSdkVersion 33
                versionCode 1
                versionName '1.0'
            }
        }
        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.9.0'
        }" > app/build.gradle

        [ -f AndroidManifest.xml ] && cp AndroidManifest.xml app/src/main/ || echo "Manifest missing"
        [ -f activity_main.xml ] && cp activity_*.xml app/src/main/res/layout/ || echo "Layouts missing"

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Build APK File
      run: |
        gradle wrapper --gradle-version 7.5
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload Finished App
      uses: actions/upload-artifact@v4
      with:
        name: QuizMasterGame
        path: app/build/outputs/apk/debug/app-debug.apk
        
