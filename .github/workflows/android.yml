name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Auto Create Clean Project Structure
      run: |
        # Clear legacy structures to prevent cache interference
        rm -rf app build.gradle settings.gradle gradle.properties res
        mkdir -p app/src/main/res/layout
        mkdir -p app/src/main/res/values
        mkdir -p app/src/main/res/xml
        mkdir -p app/src/main/res/mipmap
        
        # 1. Create global background configurations
        cat << 'EOF' > gradle.properties
        org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
        android.useAndroidX=true
        android.enableJetifier=true
        EOF
        
        # 2. Create the master plugin resolution management map
        cat << 'EOF' > settings.gradle
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
                google()
                mavenCentral()
            }
        }
        rootProject.name = "QuizMaster"
        include ':app'
        EOF
        
        # 3. Create the global parent build instructions file
        cat << 'EOF' > build.gradle
        plugins {
            id 'com.android.application' version '8.1.1' apply false
            id 'com.android.library' version '8.1.1' apply false
        }
        EOF
        
        # 4. Create the localized application framework module script
        cat << 'EOF' > app/build.gradle
        plugins {
            id 'com.android.application'
        }

        android {
            namespace 'com.example.quizmaster'
            compileSdk 33

            defaultConfig {
                applicationId 'com.example.quizmaster'
                minSdk 24
                targetSdk 33
                versionCode 1
                versionName '1.0'
            }
        }

        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.9.0'
        }
        EOF

        # 5. Create standard base theme and string configurations
        cat << 'EOF' > app/src/main/res/values/themes.xml
        <resources>
            <style name="Theme.QuizMaster" parent="Theme.MaterialComponents.DayNight.NoActionBar">
                <item name="colorPrimary">#6200EE</item>
                <item name="colorPrimaryVariant">#3700B3</item>
                <item name="colorOnPrimary">#FFFFFF</item>
                <item name="colorSecondary">#03DAC6</item>
                <item name="colorSecondaryVariant">#018786</item>
                <item name="colorOnSecondary">#000000</item>
            </style>
        </resources>
        EOF

        cat << 'EOF' > app/src/main/res/values/strings.xml
        <resources>
            <string name="app_name">QuizMaster</string>
        </resources>
        EOF

        # 6. Create required XML tracking and backup rules files
        cat << 'EOF' > app/src/main/res/xml/backup_rules.xml
        <?xml version="1.0" encoding="utf-8"?>
        <full-backup-content />
        EOF

        cat << 'EOF' > app/src/main/res/xml/data_extraction_rules.xml
        <?xml version="1.0" encoding="utf-8"?>
        <data-extraction-rules>
            <cloud-backup />
            <device-transfer />
        </data-extraction-rules>
        EOF

        # 7. Create placeholder launch icons using system colors
        cat << 'EOF' > app/src/main/res/mipmap/ic_launcher.xml
        <?xml version="1.0" encoding="utf-8"?>
        <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
            <background android:drawable="@android:color/darker_gray"/>
            <foreground android:drawable="@android:color/white"/>
        </adaptive-icon>
        EOF

        cat << 'EOF' > app/src/main/res/mipmap/ic_launcher_round.xml
        <?xml version="1.0" encoding="utf-8"?>
        <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
            <background android:drawable="@android:color/darker_gray"/>
            <foreground android:drawable="@android:color/white"/>
        </adaptive-icon>
        EOF

        # 8. Relocate layout and manifest files safely
        [ -f AndroidManifest.xml ] && cp AndroidManifest.xml app/src/main/ || echo "No explicit manifest found"
        ls activity_*.xml >/dev/null 2>&1 && cp activity_*.xml app/src/main/res/layout/ || echo "No root layout xmls found"

    - name: Ultimate Layout Sanitizer
      shell: python
      run: |
        import os, re
        target_dir = "app/src/main/res/layout"
        if os.path.exists(target_dir):
            for f in os.listdir(target_dir):
                if f.endswith(".xml"):
                    path = os.path.join(target_dir, f)
                    with open(path, "r", encoding="utf-8") as file:
                        content = file.read()
                    
                    # Erase any tools attributes that cause unbound prefix errors
                    content = re.sub(r'\s*tools:[a-zA-Z0-9_]+="[^"]*"', '', content)
                    content = re.sub(r"\s*tools:[a-zA-Z0-9_]+='[^']*'", '', content)
                    content = re.sub(r'\s*xmlns:tools="[^"]*"', '', content)
                    content = re.sub(r"\s*xmlns:tools='[^']*'", '', content)
                    
                    with open(path, "w", encoding="utf-8") as file:
                        file.write(content)
                    print(f"Successfully cleaned layout file: {f}")

    - name: Setup Centralized Gradle Engine
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.1.1

    - name: Build Executable App Artifact
      run: |
        gradle wrapper
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload Finished App
      uses: actions/upload-artifact@v4
      with:
        name: QuizMasterGame
        path: app/build/outputs/apk/debug/app-debug.apk
        
